name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'document-intelligence/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: document-intelligence

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'document-intelligence/pnpm-lock.yaml'

      - run: pnpm install --frozen-lockfile

      - name: Apply Supabase migrations
        run: pnpm dlx supabase@latest db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy to Vercel
        run: pnpm dlx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: document-intelligence/apps/web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
